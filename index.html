<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SVIA Auth</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.28.0/lib/msal-browser.min.js"></script>
</head>
<body>
<script>
try {
  const msalInstance = new msal.PublicClientApplication({
    auth: {
      clientId: 'ec6b52bb-eb56-43d5-879b-a195a5a4ada4',
      authority: 'https://login.microsoftonline.com/9444ead0-9771-4ed8-a608-802faff70d4f',
      redirectUri: 'https://jorgedeleon18.github.io/svia-embed/'
    },
    cache: { cacheLocation: 'sessionStorage' }
  });
  msalInstance.initialize().then(() => {
    msalInstance.handleRedirectPromise().then(() => {
      window.close();
    }).catch(() => {
      window.close();
    });
  }).catch(() => {
    window.close();
  });
} catch(e) {
  window.close();
}
</script>
</body>
</html>
